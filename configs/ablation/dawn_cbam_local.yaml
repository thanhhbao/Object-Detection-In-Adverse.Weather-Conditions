# Một nguồn cấu hình duy nhất để đảm bảo baseline và CBAM dùng cùng hyperparameters.
data: data/processed/dawn_yolo/dataset.yaml
pretrained: yolov8n.pt
project: runs/ablation

seed: 42
epochs: 100
imgsz: 640
batch: 16
workers: 8
device: "0"              # dùng "cpu", "mps", hoặc "0"
optimizer: AdamW
lr0: 0.001
lrf: 0.01
weight_decay: 0.0005
patience: 30
cos_lr: true
deterministic: true
amp: true

# Giữ augmentation giống hệt nhau cho cả hai biến thể.
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.0
close_mosaic: 10

# Đánh giá/benchmark.
conf: 0.001
iou: 0.6
benchmark_warmup: 20
benchmark_iterations: 100

