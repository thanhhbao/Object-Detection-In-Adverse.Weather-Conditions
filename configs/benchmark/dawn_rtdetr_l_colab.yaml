# Benchmark placeholder: RT-DETR Large -> DAWN.
# RT-DETR usually needs a smaller batch than YOLO Nano models.
model: rtdetr-l.pt
data: /content/dawn_yolo/dataset.yaml
project: /content/drive/MyDrive/adverse_weather_project/benchmark
name: dawn_rtdetr_l

epochs: 80
imgsz: 640
batch: 4
workers: 4
device: "0"

optimizer: AdamW
lr0: 0.0001
lrf: 0.01
weight_decay: 0.0005
patience: 25
cos_lr: true
deterministic: true
amp: true
seed: 42

pretrained: true
exist_ok: true
verbose: true

