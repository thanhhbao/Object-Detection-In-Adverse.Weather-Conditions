# Benchmark baseline: COCO pretrained YOLOv8s -> DAWN.
model: yolov8s.pt
data: /content/dawn_yolo/dataset.yaml
project: /content/drive/MyDrive/adverse_weather_project/benchmark
name: dawn_yolov8s

epochs: 80
imgsz: 640
batch: 16
workers: 4
device: "0"

optimizer: AdamW
lr0: 0.001
lrf: 0.01
weight_decay: 0.0005
patience: 25
cos_lr: true
deterministic: true
amp: true
seed: 42

pretrained: true
exist_ok: true
verbose: true

